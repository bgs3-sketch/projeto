<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Currículo</title>
    <link rel="stylesheet" href="style.css">

    <!-- Biblioteca PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <h1>Gerador de Currículo</h1>

    <div class="formulario">
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="profissao" placeholder="Profissão">
        <textarea id="sobre" placeholder="Sobre você"></textarea>

        <button onclick="gerarCurriculo()">Gerar Currículo</button>
        <button onclick="baixarPDF()">Baixar PDF</button>
    </div>

    <div id="curriculo" class="curriculo"></div>

    <script src="script.js"></script>
</body>
</html>
